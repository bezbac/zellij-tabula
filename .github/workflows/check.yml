name: "Check"

on:
  workflow_dispatch:
  push:

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./zellij
    steps:
      - uses: actions/checkout@v4

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: rustfmt, clippy
          targets: wasm32-wasip1

      - name: Check formatting
        run: cargo fmt --check

      - name: Check clippy
        run: cargo clippy -- -D clippy::all -D clippy::pedantic -A clippy::no_mangle_with_rust_abi

  check-opencode-integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./integrations/opencode
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ./integrations/opencode/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm run format-check

      - name: Check types
        run: pnpm run typecheck
