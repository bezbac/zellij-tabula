name: "E2E"

on:
  workflow_dispatch:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@1.96.1
        with:
          targets: wasm32-wasip1

      - name: Install docker
        uses: docker/setup-buildx-action@v3

      - name: Run E2E tests
        run: |
          ./tests/integration_test.sh
